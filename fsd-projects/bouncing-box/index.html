<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      .box {
        width: 70px;
        height: 70px;
        background-color: teal;
        font-size: 300%;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        left: 0px;
      }

      .board {
        height: 100vh;
      }
    </style>
  </head>

  <body class="board">
    <div class="box">0</div>

    <script>
      (function () {
        "use strict";
        var box = jQuery(".box");
        var board = jQuery(".board");
        var boardWidth = board.width();

        jQuery(window).on("resize", function () {
          boardWidth = board.width();
        });

        setInterval(update, 50);
        box.on("click", handleBoxClick);

        function moveBoxTo(newPositionX) {
          box.css("left", newPositionX);
        }

        function changeBoxText(newText) {
          box.text(newText);
        }

        // VARIABLES
        var positionX = 0;
        var points = 0;
        var speed = 10;

        function update() {
          // move box
          positionX += speed;

          // right wall
          if (positionX > boardWidth - 70) {
            speed *= -1;
          }

          // left wall
          if (positionX < 0) {
            speed *= -1;
          }

          moveBoxTo(positionX);
        }

        function handleBoxClick() {
          // increase score
          points++;

          // reset position
          positionX = 0;

          // update speed using formula
          speed = 3 * points + 10;

          // update text
          changeBoxText(points);
        }
      })();
    </script>
  </body>
</html>
