<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      .box {
        width: 70px;
        height: 70px;
        background-color: teal;
        font-size: 300%;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        /* starting x-position */
        left: 0px;
      }

      .board {
        height: 100vh;
      }
    </style>
  </head>

  <body class="board">
    <!-- HTML for the box -->
    <div class="box">0</div>

    <script>
      (function () {
        "use strict";
        /* global jQuery */

        //////////////////////////////////////////////////////////////////
        /////////////////// SETUP DO NOT DELETE //////////////////////////
        //////////////////////////////////////////////////////////////////

        var box = jQuery(".box"); // reference to the HTML .box element
        var board = jQuery(".board"); // reference to the HTML .board element
        var boardWidth = board.width(); // the maximum X-Coordinate of the screen

        // update the boardWidth variable when the window is resized
        jQuery(window).on("resize", function () {
          boardWidth = board.width();
        });

        // Every 50 milliseconds, call the update Function (see below)
        setInterval(update, 50);

        // Every time the box is clicked, call the handleBoxClick Function (see below)
        box.on("click", handleBoxClick);

        // moves the Box to a new position on the screen along the X-Axis
        function moveBoxTo(newPositionX) {
          box.css("left", newPositionX);
        }

        // changes the text displayed on the Box
        function changeBoxText(newText) {
          box.text(newText);
        }

        //////////////////////////////////////////////////////////////////
        /////////////////// YOUR CODE BELOW HERE /////////////////////////
        //////////////////////////////////////////////////////////////////

        // Variables
        var positionX = 0; // x-position of the box
        var points = 0; // score (number of clicks)
        var speed = 10; // how many pixels the box moves each update

        // This function runs ~20 times per second
        function update() {
          // move the box by "speed" pixels each update
          positionX = positionX + speed;

          // bounce off the right side
          if (positionX > boardWidth) {
            speed *= -1;
          }

          // bounce off the left side
          if (positionX < 0) {
            speed *= -1;
          }

          // move the box on screen
          moveBoxTo(positionX);
        }

        // Called each time the box is clicked
        function handleBoxClick() {
          // reset box to left side
          positionX = 0;

          // increase score
          points++;

          // set speed using linear formula (fixes the bug)
          speed = 3 * points + 10;

          // show score on the box
          changeBoxText(points);
        }
      })();
    </script>
  </body>
</html>
