<!DOCTYPE html> 
<html> 
<head> 
<meta charset="utf-8" /> 
<title>Bouncing Box</title> 
<script src="jquery.min.js"></script> 
<style> 
.box { 
 width: 70px; 
 height: 70px; 
 background-color: teal; 
 font-size: 300%; 
 text-align: center; 
 user-select: none; 
 display: block; 
 position: absolute; 
 top: 100px; 
 left: 0px; 
} 
.board { 
 height: 100vh; 
} 
</style> 
</head> 
<body class="board"> 

<div class="box">?</div> 

<script> 
(function () { 
"use strict"; 

/* global jQuery */ 

var box = jQuery(".box"); 
var board = jQuery(".board"); 
var boardWidth = board.width(); 

jQuery(window).on("resize", function () { 
 boardWidth = board.width(); 
}); 

setInterval(update, 50); 
box.on("click", handleBoxClick); 

function moveBoxTo(newPositionX) { 
 box.css("left", newPositionX); 
} 

function changeBoxText(newText) { 
 box.text(newText); 
} 

////////////////////////////////////////////////////////////////// 
/////////////////// YOUR CODE BELOW HERE ///////////////////////// 
////////////////////////////////////////////////////////////////// 

// TODO 2 - Variable declarations
var positionX = 0;
var points = 0;
var speed = 10;

function update() { 

 moveBoxTo(positionX); // <-- for TODO 1 (original style kept)

 positionX = positionX + speed; // TODO 2 / 5

 if (positionX > boardWidth) { // TODO 6
  speed *= -1;
 }

 if (positionX < 0) { // TODO 7
  speed *= -1;
 }

} 

function handleBoxClick() { 

 positionX = 0; // TODO 3

 points++; // TODO 4

 changeBoxText(points); // TODO 4 (updated from 0)

 speed = speed + 3; // (for TODO 5 early version, then overridden by formula below)

 speed = 3 * points + 10; // TODO 8 (final fix)

} 

})(); 
</script> 

</body>
